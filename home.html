<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#A11D2E">
  <title>DPS-INVENTORY · Admin Portal</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/fonts.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/animation.css">
</head>
<body>
  <div class="screen">
    <!-- Top App Bar -->
    <div class="topbar">
      <button class="btn-icon ripple-surface" id="menuBtn"><span class="material-icons">menu</span></button>
      <div class="topbar-title" id="topbarTitle">Home</div>
      <button class="btn-icon ripple-surface" id="settingsBtn" title="Change PIN">
        <span class="material-icons">lock_reset</span>
      </button>
    </div>

    <!-- Drawer -->
    <div class="drawer-scrim" id="drawerScrim"></div>
    <div class="drawer" id="drawer">
      <div class="drawer-header gradient-red-solid">
        <img src="assets/icons/icon-192.png" alt="" onerror="this.style.display='none'">
        <div class="store-name">STORE</div>
        <div class="store-sub">DPS-INVENTORY Admin Portal</div>
      </div>
      <div class="drawer-nav">
        <div class="drawer-item ripple-surface active" data-view="home">
          <span class="material-icons">dashboard</span> Home
        </div>
        <div class="drawer-item ripple-surface" data-view="add-items">
          <span class="material-icons">add_box</span> Add Items
        </div>
        <div class="drawer-item ripple-surface" data-view="all-items">
          <span class="material-icons">inventory_2</span> All Items
        </div>
        <div class="drawer-item ripple-surface" id="logoutBtn">
          <span class="material-icons">logout</span> Logout
        </div>
      </div>
    </div>

    <!-- Dynamic content -->
    <div class="content" id="content"></div>

    <!-- Floating action button (contextual add) -->
    <button class="fab ripple-surface" id="fabAdd" title="Add product">
      <span class="material-icons">add</span>
    </button>
  </div>

  <script src="cordova.js" onerror="this.remove()"></script>
  <script src="js/storage.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/scanner.js"></script>
  <script src="js/inventory.js"></script>
  <script src="js/print.js"></script>
  <script src="js/app.js"></script>
  <script>
    // Keep the top bar title in sync with the active drawer item.
    document.getElementById('drawer').addEventListener('click', (e) => {
      const item = e.target.closest('.drawer-item[data-view]');
      if (!item) return;
      const labels = { home: 'Home', 'add-items': 'Add Items', 'all-items': 'All Items' };
      document.getElementById('topbarTitle').textContent = labels[item.dataset.view] || 'DPS-INVENTORY';
    });

    document.getElementById('settingsBtn').addEventListener('click', () => {
      window.location.href = 'login.html?mode=change';
    });

    document.getElementById('fabAdd').addEventListener('click', () => {
      const addBtn = document.getElementById('openAddProductBtn');
      if (addBtn) { addBtn.click(); }
      else {
        document.querySelector('.drawer-item[data-view="add-items"]').click();
        setTimeout(() => document.getElementById('openAddProductBtn')?.click(), 260);
      }
    });
  </script>
</body>
</html>
